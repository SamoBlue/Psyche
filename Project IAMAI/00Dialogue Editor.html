<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dialogue tree · rich text editor</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #1b1e2b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .editor-container {
            max-width: 1300px;
            width: 100%;
            background: #282e3f;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.06) inset;
            padding: 28px;
            backdrop-filter: blur(2px);
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #f0eefc;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding-left: 8px;
        }
        h1 span {
            background: #7f6df2;
            color: white;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 40px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .toolbar {
            background: #1e2332;
            border-radius: 24px;
            padding: 14px 18px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            border: 1px solid #3e445a;
            box-shadow: 0 8px 12px -8px #0b0d15;
        }
        .tool-btn {
            background: #2e354a;
            border: none;
            color: #e2e6f0;
            font-size: 1rem;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 30px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.15s;
            box-shadow: 0 2px 3px #10131e;
            border-bottom: 2px solid #1f2537;
        }
        .tool-btn:hover {
            background: #3f485f;
            color: white;
            border-bottom-color: #7f6df2;
            transform: translateY(-1px);
        }
        .tool-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }
        .color-picker-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #1b1f2d;
            padding: 4px 10px 4px 16px;
            border-radius: 40px;
            border: 1px solid #3b4057;
        }
        .color-label {
            font-size: 0.85rem;
            color: #b6c1db;
        }
        input[type="color"] {
            width: 38px;
            height: 38px;
            border: 2px solid #5a6080;
            border-radius: 40px;
            background: transparent;
            cursor: pointer;
            padding: 2px;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 40px;
        }
        .main-panel {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .edit-section {
            flex: 2;
            min-width: 400px;
        }
        .tree-section {
            flex: 1.2;
            min-width: 280px;
            background: #1e2332;
            border-radius: 28px;
            padding: 22px 16px;
            border: 1px solid #3f465d;
            box-shadow: inset 0 2px 5px #151a26;
        }
        .section-label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #9da9c7;
            margin-bottom: 16px;
            padding-left: 12px;
        }
        .rich-editor-box {
            background: #171c2a;
            border-radius: 28px;
            padding: 16px;
            border: 1px solid #404864;
            box-shadow: 0 10px 20px -10px #0d0f17;
        }
        #richTextField {
            background: #fefcf9;
            border-radius: 20px;
            padding: 24px 22px;
            min-height: 260px;
            font-size: 1.2rem;
            line-height: 1.5;
            color: #222;
            outline: none;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.2), 0 0 0 2px #646b8b;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            margin-bottom: 24px;
        }
        #richTextField:focus {
            box-shadow: inset 0 4px 12px #b4aeff, 0 0 0 3px #8d7ef0;
        }
        /* rich content style examples inside editor */
        #richTextField b, #richTextField strong { font-weight: 700; }
        #richTextField i, #richTextField em { font-style: italic; }
        #richTextField u { text-decoration: underline; }
        .choice-builder {
            background: #1e2330;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #4a506b;
        }
        .choice-header {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
        }
        .choice-header h3 {
            color: white;
            font-weight: 500;
            font-size: 1.3rem;
        }
        .choice-badge {
            background: #5b4eb0;
            color: white;
            border-radius: 60px;
            padding: 2px 14px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .choice-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 24px;
            max-height: 280px;
            overflow-y: auto;
            padding-right: 6px;
        }
        .choice-item {
            background: #2f3548;
            border-radius: 40px;
            padding: 10px 18px 10px 22px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 6px #141825;
            border-left: 6px solid #7f6df2;
            transition: 0.1s;
        }
        .choice-item.selected {
            border-left-color: #ffb86b;
            background: #3e455b;
            box-shadow: 0 0 0 2px #ffb86b66;
        }
        .choice-preview {
            flex: 1;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }
        .choice-preview b, .choice-preview i, .choice-preview u, .choice-preview span {
            color: inherit; /* keep inline formatting visible */
        }
        .choice-arrow {
            color: #b5c1e6;
            font-size: 1.2rem;
            margin-right: 4px;
        }
        .btn-icon {
            background: none;
            border: none;
            color: #d5daf0;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0 4px;
            transition: 0.1s;
            border-radius: 20px;
            line-height: 1;
        }
        .btn-icon:hover {
            color: #ff7b7b;
            background: #2e253c;
            transform: scale(1.1);
        }
        .add-choice-area {
            display: flex;
            gap: 10px;
            margin: 16px 0 12px;
        }
        #newChoiceInput {
            flex: 1;
            background: #0f1322;
            border: 1px solid #4b5270;
            border-radius: 60px;
            padding: 14px 18px;
            color: white;
            font-size: 1rem;
        }
        #newChoiceInput::placeholder {
            color: #7982aa;
            font-style: italic;
        }
        .primary-btn {
            background: #7f6df2;
            border: none;
            border-radius: 60px;
            padding: 14px 22px;
            font-weight: 600;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border-bottom: 3px solid #5246a3;
            transition: 0.15s;
            font-size: 0.95rem;
        }
        .primary-btn:hover {
            background: #9484f5;
            border-bottom-color: #6657c2;
            transform: scale(1.02);
        }
        .secondary-btn {
            background: #313a50;
            border: 1px solid #60698b;
            border-radius: 60px;
            padding: 12px 16px;
            color: #eceeff;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
        }
        .secondary-btn:hover {
            background: #404d6b;
        }
        .tree-preview-area {
            background: #131725;
            border-radius: 24px;
            padding: 20px 16px;
            border: 1px solid #414b67;
            margin-top: 20px;
        }
        .preview-scroll {
            max-height: 300px;
            overflow-y: auto;
            padding: 6px 0;
        }
        .tree-node {
            padding: 14px 16px 14px 28px;
            background: #252c3f;
            border-radius: 50px;
            margin-bottom: 12px;
            border-left: 8px solid #7f6df2;
            font-size: 0.95rem;
            color: #f3f0ff;
            box-shadow: 0 6px 8px #0b0e17;
            word-break: break-word;
            position: relative;
        }
        .tree-node .node-choices {
            margin-top: 10px;
            margin-left: 24px;
            padding-left: 16px;
            border-left: 3px dashed #6f5fc7;
        }
        .tree-node .child-choice {
            background: #2f3650;
            border-radius: 30px;
            padding: 8px 16px;
            margin: 8px 0;
            color: #cbd5ff;
            font-size: 0.9rem;
            border: 1px solid #636b94;
        }
        .small-note {
            color: #98a2c2;
            font-size: 0.8rem;
            margin-top: 16px;
            text-align: center;
        }
        hr {
            border: 0.5px solid #404866;
            margin: 20px 0 12px;
        }
        .flex-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<div class="editor-container">
    <h1>🎙️ dialogue tree editor <span>branching + style</span></h1>

    <div class="toolbar">
        <button class="tool-btn" id="boldBtn"><b>B</b></button>
        <button class="tool-btn" id="italicBtn"><i>I</i></button>
        <button class="tool-btn" id="underlineBtn"><u>U</u></button>
        <div class="color-picker-group">
            <span class="color-label">color</span>
            <input type="color" id="colorPicker" value="#d36feb">
        </div>
        <button class="tool-btn" id="applyColor">🎨 apply</button>
        <div style="flex:1"></div>
        <button class="tool-btn" id="saveNodeBtn">💾 save as current node</button>
    </div>

    <div class="main-panel">
        <!-- left: editing area -->
        <div class="edit-section">
            <div class="rich-editor-box">
                <span class="section-label">✎ EDIT DIALOGUE (rich text)</span>
                <div id="richTextField" contenteditable="true" spellcheck="false">Welcome, <b>brave hero</b>! <span style="color:#b565f3;">✧ the path splits ✧</span></div>
                <!-- choice management panel -->
                <div class="choice-builder">
                    <div class="choice-header">
                        <h3>🔗 choices from this node</h3>
                        <div class="choice-badge" id="choiceCount">0</div>
                    </div>
                    <div class="choice-list" id="choiceListContainer">
                        <!-- dynamic choice items will appear -->
                    </div>

                    <div class="add-choice-area">
                        <input type="text" id="newChoiceInput" placeholder="e.g. 'I will help you...' (plain text)">
                        <button class="primary-btn" id="addChoiceBtn">+ add choice</button>
                    </div>
                    <div class="flex-row">
                        <button class="secondary-btn" id="removeSelectedBtn">🗑️ remove selected</button>
                        <span style="color:#a7b2db; font-size:0.85rem; margin-left:auto;">click on a choice to select</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- right: tree structure preview -->
        <div class="tree-section">
            <span class="section-label">🌿 DIALOGUE TREE (preview)</span>
            <div class="preview-scroll" id="treePreview">
                <!-- dynamic tree preview -->
            </div>
            <hr>
            <div style="display: flex; gap: 8px; justify-content: center;">
                <button class="secondary-btn" id="newTreeBtn">➕ new tree</button>
                <button class="secondary-btn" id="resetExampleBtn">📋 load example</button>
            </div>
            <div class="small-note">
                current node <span style="color:#cfa6ff;">▼</span> choices lead to children
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- data structure ----------
        let dialogueTree = {
            // each node: { id: string, text: string (inner HTML), choices: [{ text: string, targetId: string or null }] }
            nodes: []
        };

        let nextId = 100;
        // currently selected node id (for editing)
        let currentNodeId = null;

        // Helper to find node by id
        function findNode(id) {
            return dialogueTree.nodes.find(n => n.id === id);
        }

        // Create a new node with given html text, return id
        function createNode(htmlText = "empty node") {
            const id = (nextId++).toString();
            dialogueTree.nodes.push({
                id: id,
                text: htmlText,
                choices: []
            });
            return id;
        }

        // Initial example data (same as visible editor but structured)
        function buildExampleTree() {
            dialogueTree.nodes = [];
            nextId = 200;
            const rootId = createNode('Welcome, <b>brave hero</b>! <span style="color:#b565f3;">✧ the path splits ✧</span>');
            const nodeAId = createNode('You see a <span style="color:#4caf50;">forest</span> and a <i>dark cave</i>.');
            const nodeBId = createNode('<b style="color:#e06c6c;">Guard:</b> "State your business."');
            const nodeCId = createNode('Cave is <u>damp</u>... <span style="color:#d78cff;">glowing mushrooms</span>');

            // set choices for root
            const rootNode = findNode(rootId);
            rootNode.choices = [
                { text: 'Enter the <span style="color:#86e686;">forest</span>', targetId: nodeAId },
                { text: 'Approach the <b>guard</b>', targetId: nodeBId },
                { text: '<i>sneak</i> into cave', targetId: nodeCId }
            ];
            // nodeA choices
            const nodeA = findNode(nodeAId);
            nodeA.choices = [
                { text: 'Pick <span style="color:orange;">flowers</span>', targetId: null },
                { text: 'Follow the path', targetId: null }
            ];
            // nodeB choices
            findNode(nodeBId).choices = [
                { text: '<b>Bribe</b> with gold', targetId: null },
                { text: 'Say "<i>friend</i>"', targetId: null }
            ];
            // nodeC choices empty

            currentNodeId = rootId;
            renderAll();
        }

        // Render the HTML editor field with current node content
        function updateEditorFromCurrent() {
            const field = document.getElementById('richTextField');
            if (currentNodeId) {
                const node = findNode(currentNodeId);
                if (node) {
                    field.innerHTML = node.text;
                } else {
                    field.innerHTML = '';
                }
            } else {
                field.innerHTML = '';
            }
            renderChoiceList();  // update choices panel
        }

        // Save current editor content to current node
        function saveCurrentNodeFromEditor() {
            if (!currentNodeId) {
                // if no node selected, create new node and set as current
                const newId = createNode(document.getElementById('richTextField').innerHTML);
                currentNodeId = newId;
            } else {
                const node = findNode(currentNodeId);
                if (node) {
                    node.text = document.getElementById('richTextField').innerHTML;
                } else {
                    // fallback: create node
                    const newId = createNode(document.getElementById('richTextField').innerHTML);
                    currentNodeId = newId;
                }
            }
            renderAll();
        }

        // Render the choice list panel based on current node
        function renderChoiceList() {
            const container = document.getElementById('choiceListContainer');
            const choiceCountSpan = document.getElementById('choiceCount');
            if (!currentNodeId) {
                container.innerHTML = '<div style="color:#9aa6c9; padding:20px; text-align:center;">no node selected</div>';
                choiceCountSpan.innerText = '0';
                return;
            }
            const node = findNode(currentNodeId);
            if (!node) {
                container.innerHTML = '<div style="color:#9aa6c9;">choose a node</div>';
                choiceCountSpan.innerText = '0';
                return;
            }

            const choices = node.choices || [];
            choiceCountSpan.innerText = choices.length;

            if (choices.length === 0) {
                container.innerHTML = '<div style="color:#6b75a0; text-align:center; padding:18px;">✦ no choices yet</div>';
                return;
            }

            let html = '';
            choices.forEach((ch, index) => {
                const targetName = ch.targetId ? (findNode(ch.targetId) ? '→ ' + findNode(ch.targetId).text.substring(0,15).replace(/<[^>]*>/g,'') + '…' : '🔗 linked') : '⚡ end';
                html += `<div class="choice-item" data-choice-index="${index}">
                    <span class="choice-arrow">🔹</span>
                    <span class="choice-preview">${ch.text || 'empty'}</span>
                    <span style="color:#a4b0da; font-size:0.8rem; background:#1e2538; padding:4px 12px; border-radius:60px;">${targetName}</span>
                    <button class="btn-icon delete-choice" data-index="${index}">✕</button>
                </div>`;
            });
            container.innerHTML = html;

            // Attach delete events
            document.querySelectorAll('.delete-choice').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = btn.getAttribute('data-index');
                    if (currentNodeId && idx !== null) {
                        const node = findNode(currentNodeId);
                        if (node) {
                            node.choices.splice(parseInt(idx), 1);
                            renderAll();
                        }
                    }
                });
            });

            // Simple selection style
            document.querySelectorAll('.choice-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON') return;
                    document.querySelectorAll('.choice-item').forEach(ci => ci.classList.remove('selected'));
                    el.classList.add('selected');
                });
            });
        }

        // Render tree preview on right
        function renderTreePreview() {
            const previewDiv = document.getElementById('treePreview');
            if (!dialogueTree.nodes.length) {
                previewDiv.innerHTML = '<div style="color:#6c79a4; padding:20px; text-align:center;">🌱 empty tree<br>add nodes via save</div>';
                return;
            }

            let html = '';
            dialogueTree.nodes.forEach(node => {
                const isCurrent = (currentNodeId === node.id);
                const nodeLabel = node.text.substring(0, 50).replace(/<[^>]*>/g, '') || '…';
                html += `<div class="tree-node" style="${isCurrent ? 'border-left-color:#ffb86b; background:#373f59;' : ''}">
                    <div><b>${isCurrent ? '◉ ' : '○ '}</b> ${nodeLabel} <span style="color:#9aa9dd;">[${node.choices.length} choices]</span></div>`;
                if (node.choices.length > 0) {
                    html += '<div class="node-choices">';
                    node.choices.forEach(ch => {
                        const targetNode = ch.targetId ? findNode(ch.targetId) : null;
                        const targetName = targetNode ? targetNode.text.substring(0,15).replace(/<[^>]*>/g,'') + '…' : '💬 leaf';
                        html += `<div class="child-choice"> ↳ <span>${ch.text.replace(/<[^>]*>/g,'').substring(0,20)}</span> <span style="color:#b3a2ff;">→ ${targetName}</span></div>`;
                    });
                    html += '</div>';
                }
                html += '</div>';
            });
            previewDiv.innerHTML = html;
        }

        function renderAll() {
            renderTreePreview();
            renderChoiceList();
            // ensure editor content matches current node (but don't overwrite if user is typing? we'll sync)
            if (currentNodeId) {
                const node = findNode(currentNodeId);
                if (node) {
                    const field = document.getElementById('richTextField');
                    if (field.innerHTML !== node.text) {
                        field.innerHTML = node.text;
                    }
                }
            }
        }

        // Add new choice from input to current node
        function addChoiceFromInput() {
            if (!currentNodeId) {
                alert('please select or create a node first (save any text)');
                return;
            }
            const node = findNode(currentNodeId);
            if (!node) return;

            const input = document.getElementById('newChoiceInput');
            let rawText = input.value.trim();
            if (rawText === '') {
                // fallback placeholder
                rawText = 'new path...';
            }
            // we store text as plain but allow html? we want formatting, so store as html (we'll treat it as inner html for preview)
            // For simplicity, we store as entered, but user may want simple text. We'll wrap it to allow future formatting.
            // We'll store exactly input, but let's allow html tags via basic formatting? we could bold etc, but input is text. we convert line breaks? We'll store as plain text but user can later edit via "save node"
            // But we want choices with formatting: we'll use rawText as innerHTML (but input is plain). Let's add ability later? For demo we treat as plain but can be overwritten.
            node.choices.push({ text: rawText, targetId: null });
            input.value = '';
            renderAll();
        }

        // Remove selected choice (simple: remove last? we'll use selected class)
        function removeSelectedChoice() {
            if (!currentNodeId) return;
            const selected = document.querySelector('.choice-item.selected');
            if (!selected) {
                // fallback: remove last
                const node = findNode(currentNodeId);
                if (node && node.choices.length > 0) {
                    node.choices.pop();
                }
            } else {
                const idx = selected.getAttribute('data-choice-index');
                if (idx !== null) {
                    const node = findNode(currentNodeId);
                    if (node) node.choices.splice(parseInt(idx), 1);
                }
            }
            renderAll();
        }

        // ----- text formatting helpers (execCommand) -----
        function exec(command, value = null) {
            document.getElementById('richTextField').focus();
            document.execCommand(command, false, value);
        }

        // set up toolbar
        document.getElementById('boldBtn').addEventListener('click', () => exec('bold'));
        document.getElementById('italicBtn').addEventListener('click', () => exec('italic'));
        document.getElementById('underlineBtn').addEventListener('click', () => exec('underline'));
        document.getElementById('applyColor').addEventListener('click', () => {
            const color = document.getElementById('colorPicker').value;
            exec('foreColor', color);
        });

        // save node (update current node from editor)
        document.getElementById('saveNodeBtn').addEventListener('click', () => {
            saveCurrentNodeFromEditor();
        });

        // add choice
        document.getElementById('addChoiceBtn').addEventListener('click', addChoiceFromInput);

        // remove selected
        document.getElementById('removeSelectedBtn').addEventListener('click', removeSelectedChoice);

        // new tree
        document.getElementById('newTreeBtn').addEventListener('click', () => {
            dialogueTree.nodes = [];
            nextId = 1;
            currentNodeId = null;
            document.getElementById('richTextField').innerHTML = '';
            renderAll();
        });

        // load example
        document.getElementById('resetExampleBtn').addEventListener('click', () => {
            buildExampleTree();
        });

        // clicking on tree preview to change current node (basic)
        document.getElementById('treePreview').addEventListener('click', (e) => {
            // find closest tree-node div
            const nodeDiv = e.target.closest('.tree-node');
            if (nodeDiv) {
                // we need to map node id based on order? we can store data-id but easier: iterate nodes and compare text?
                // naive: use index based on order (for demo, simple). but we can rebuild with data-id.
                // Let's quickly regenerate preview with data-id.
                // we'll re-render with data-id approach: modify renderTreePreview to attach data-node-id.
                // we'll quick-improve:
            }
        });

        // improve tree preview with data-node-id (re-render)
        function renderTreePreview() {
            const previewDiv = document.getElementById('treePreview');
            if (!dialogueTree.nodes.length) {
                previewDiv.innerHTML = '<div style="color:#6c79a4; padding:20px; text-align:center;">🌱 empty tree<br>add nodes via save</div>';
                return;
            }

            let html = '';
            dialogueTree.nodes.forEach(node => {
                const isCurrent = (currentNodeId === node.id);
                const nodeLabel = node.text.substring(0, 50).replace(/<[^>]*>/g, '') || '…';
                html += `<div class="tree-node" data-node-id="${node.id}" style="${isCurrent ? 'border-left-color:#ffb86b; background:#373f59;' : ''}">
                    <div><b>${isCurrent ? '◉ ' : '○ '}</b> ${nodeLabel} <span style="color:#9aa9dd;">[${node.choices.length}]</span></div>`;
                if (node.choices.length > 0) {
                    html += '<div class="node-choices">';
                    node.choices.forEach(ch => {
                        const targetNode = ch.targetId ? findNode(ch.targetId) : null;
                        const targetName = targetNode ? targetNode.text.substring(0,15).replace(/<[^>]*>/g,'') + '…' : '💬 leaf';
                        html += `<div class="child-choice"> ↳ ${ch.text.replace(/<[^>]*>/g,'').substring(0,20)} <span style="color:#b3a2ff;">→ ${targetName}</span></div>`;
                    });
                    html += '</div>';
                }
                html += '</div>';
            });
            previewDiv.innerHTML = html;

            // add click to set current node
            document.querySelectorAll('.tree-node').forEach(div => {
                div.addEventListener('click', (e) => {
                    const nid = div.dataset.nodeId;
                    if (nid && findNode(nid)) {
                        currentNodeId = nid;
                        updateEditorFromCurrent();
                        renderAll();
                    }
                });
            });
        }

        // initialize example
        buildExampleTree();

        // extra: update node text on input, but we keep manual save. auto-save? we leave as manual.
        // but keep editor in sync when changing node.
        window.addEventListener('load', () => {
            renderAll();
        });
    })();
</script>
</body>
</html>
